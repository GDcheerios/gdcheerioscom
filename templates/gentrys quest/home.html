<html>
    <head>
        {% block head %}
        <title>Gentry's Quest</title>
        <link rel="stylesheet" href="/static/style.css">
        <link rel="stylesheet" href="/static/gentrys-quest-style.css">
        {% endblock %}
    </head>
    <body>
        {% include 'navbar.html' %}
        {% block body %}
        <section class="block" style="display: grid; gap: 16px; justify-items: center; text-align: center; max-width: 700px; margin: 0 auto;">
            <h1 style="font-size: 350%; margin: 0;">Gentry's Quest</h1>
            <p class="muted" style="margin: 0;">Download the latest Windows installer below.</p>
            <a
                href="https://github.com/gdcheerios/GentrysQuest/releases/latest/download/GentrysQuest-win-Setup.exe"
                class="button"
                style="padding: 12px 24px; font-size: 16px; font-weight: bold; background: #2b2b2b; color: white; text-decoration: none; border-radius: 8px; display: inline-block; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #3a3a3a;"
            >
                Download for Windows
            </a>
        </section>
        {% endblock %}
    </body>
</html>
